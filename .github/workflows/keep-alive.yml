name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (15m timeout)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -f https://talentflowapi.onrender.com/api/v1/health || (echo "Ping failed" && exit 1)
